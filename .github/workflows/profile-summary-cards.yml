name: Generate profile summary cards

on:
  schedule:
    - cron: "17 20 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/workflows/profile-summary-cards.yml

jobs:
  build:
    name: Generate GitHub profile summary cards
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - name: Download selected summary cards
        run: |
          set -euo pipefail

          for theme in github github_dark; do
            mkdir -p "profile-summary-card-output/${theme}"
            curl -fsSL "https://github-profile-summary-cards.vercel.app/api/cards/profile-details?username=${GITHUB_REPOSITORY_OWNER}&theme=${theme}" -o "profile-summary-card-output/${theme}/0-profile-details.svg"
            curl -fsSL "https://github-profile-summary-cards.vercel.app/api/cards/repos-per-language?username=${GITHUB_REPOSITORY_OWNER}&theme=${theme}" -o "profile-summary-card-output/${theme}/1-repos-per-language.svg"
            curl -fsSL "https://github-profile-summary-cards.vercel.app/api/cards/most-commit-language?username=${GITHUB_REPOSITORY_OWNER}&theme=${theme}" -o "profile-summary-card-output/${theme}/2-most-commit-language.svg"
            curl -fsSL "https://github-profile-summary-cards.vercel.app/api/cards/stats?username=${GITHUB_REPOSITORY_OWNER}&theme=${theme}" -o "profile-summary-card-output/${theme}/3-stats.svg"
            curl -fsSL "https://github-profile-summary-cards.vercel.app/api/cards/productive-time?username=${GITHUB_REPOSITORY_OWNER}&theme=${theme}&utcOffset=8" -o "profile-summary-card-output/${theme}/4-productive-time.svg"
          done

      - name: Commit summary card updates
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-summary-card-output/github profile-summary-card-output/github_dark
          git diff --cached --quiet && exit 0
          git commit -m "Update profile summary cards"
          git push
