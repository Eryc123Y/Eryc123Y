name: Generate 3D contribution chart

on:
  schedule:
    - cron: "17 20 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - README.md
      - conf/github-profile-3d-contrib.json
      - .github/workflows/profile-3d-contrib.yml

permissions:
  contents: write

jobs:
  build:
    name: Generate GitHub profile 3D contribution chart
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7
      - uses: yoshi389111/github-profile-3d-contrib@v0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: conf/github-profile-3d-contrib.json
      - name: Commit 3D contribution chart updates
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/day.svg profile-3d-contrib/night.svg
          git diff --cached --quiet && exit 0
          git commit -m "Update 3D contribution chart"
          git push
